name: Task reminders

# Pings the reminders endpoint every 5 minutes so timed-task push
# notifications fire even when the app is closed. Uses GitHub's free
# scheduler, no external account needed.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping reminders endpoint
        run: curl -fsS "https://razin-tracker.vercel.app/api/check-deadlines?mode=reminders" || true
