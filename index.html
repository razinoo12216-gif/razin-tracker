<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="12 World" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <title>Razin — 12 World</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <h1>12 World</h1>
      <select id="month-select" aria-label="Month"></select>
      <button id="add-btn" type="button">+ New</button>
    </div>
    <div class="totals">
      <div class="totals-item"><label>Revenue</label><span id="t-rev">£0</span></div>
      <div class="totals-item"><label>Expenses</label><span id="t-exp">£0</span></div>
      <div class="totals-item net"><label>Net</label><span id="t-net">£0</span></div>
      <div class="totals-item"><label>Entries</label><span id="t-count">0</span></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="project" type="button">Projects <span class="tab-count" id="tc-project">0</span></button>
      <button class="tab" data-tab="potential" type="button">Chop list <span class="tab-count" id="tc-potential">0</span></button>
      <button class="tab" data-tab="expense" type="button">Expenses <span class="tab-count" id="tc-expense">0</span></button>
      <button class="tab" data-tab="invoice" type="button">Invoices <span class="tab-count" id="tc-invoice">0</span></button>
      <button class="tab" data-tab="review" type="button">Weekly Recap <span class="tab-count" id="tc-review">0</span></button>
      <button class="tab" data-tab="drive" type="button">Drive</button>
    </div>
  </header>

  <main>
    <div class="filter-bar" id="filter-bar">
      <input id="search" type="search" placeholder="Search…" autocomplete="off" />
      <select id="secondary-filter" aria-label="Filter"></select>
    </div>
    <div id="list"></div>
  </main>

  <!-- Project / Expense / Potential editor -->
  <dialog id="editor">
    <form id="editor-form">
      <h2 id="editor-title">Entry</h2>
      <input type="hidden" name="type" value="project" />

      <label>Name<input name="name" required autocomplete="off" /></label>

      <div class="row">
        <label data-field="month-field">Month<input name="month" type="month" required /></label>

        <label data-field="status">Status
          <select name="status">
            <option>Active</option>
            <option>Paused</option>
            <option>Completed</option>
          </select>
        </label>

        <label data-field="category" style="display:none">Category
          <select name="category">
            <option>Operations</option>
            <option>Marketing</option>
            <option>Subscriptions</option>
            <option>Transport</option>
            <option>Food</option>
            <option>Stock</option>
            <option>Wages</option>
            <option>Rent / Bills</option>
            <option>Tax</option>
            <option>Personal</option>
            <option>Other</option>
          </select>
        </label>
      </div>

      <div data-field="project-money" class="row">
        <label>Revenue<input name="revenue" autocomplete="off" placeholder="£" inputmode="decimal" /></label>
        <label>Expenses<input name="expenses" autocomplete="off" placeholder="£" inputmode="decimal" /></label>
      </div>

      <label data-field="expense-amount" style="display:none">Amount<input name="expenses" autocomplete="off" placeholder="£" inputmode="decimal" /></label>

      <div data-field="potential-money" class="row" style="display:none">
        <label>Estimated value<input name="revenue" autocomplete="off" placeholder="£" inputmode="decimal" /></label>
        <label>Expenses<input name="expenses" autocomplete="off" placeholder="£" inputmode="decimal" /></label>
      </div>

      <div data-field="potential-dates" class="row" style="display:none">
        <label>Last contact<input name="last_contact" type="date" /></label>
        <label>Next follow-up<input name="next_followup" type="date" /></label>
      </div>

      <div data-field="recurring-block" class="recurring-block">
        <label class="checkbox-label">
          <input type="checkbox" name="recurring" id="recurring-check" />
          <span>Recurring monthly — auto-applies to every month from this one</span>
        </label>
        <label data-field="end-month" style="display:none">End month (optional)<input name="end_month" type="month" /></label>
      </div>

      <label data-field="people">People<textarea name="people" placeholder="Names, roles, contacts"></textarea></label>
      <label data-field="tasks">Tasks<textarea name="tasks" placeholder="One per line"></textarea></label>
      <label>Notes<textarea name="notes"></textarea></label>

      <div class="actions">
        <button type="button" id="delete-btn" class="danger">Delete</button>
        <button type="button" id="cancel-btn">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Sunday Review editor -->
  <dialog id="review-editor">
    <form id="review-form">
      <h2 id="review-title">Weekly Recap</h2>

      <label>Week ending (Friday)<input name="week_of" type="date" required /></label>

      <div class="review-section">
        <div class="review-section-header">The week</div>
        <label>Wins<textarea name="wins" rows="3" placeholder="Top 3 things that landed this week"></textarea></label>
        <label>Losses / setbacks<textarea name="losses" rows="3" placeholder="What went sideways, who let me down, what I dropped"></textarea></label>
        <label>Lessons<textarea name="lessons" rows="2" placeholder="One per line — what won't I repeat?"></textarea></label>
      </div>

      <div class="review-section">
        <div class="review-section-header">Honesty</div>
        <label>What did I avoid?<textarea name="avoided" rows="2" placeholder="The hard call I didn't make. The DM I didn't send."></textarea></label>
        <label>Where did I break my word or lie?<textarea name="broken_word" rows="2" placeholder="Including to myself"></textarea></label>
      </div>

      <div class="review-section">
        <div class="review-section-header">Discipline (1–10)</div>
        <div class="scores">
          <label>Prayer<input name="score_prayer" type="number" min="0" max="10" inputmode="numeric" /></label>
          <label>Gym &lt;9am<input name="score_gym" type="number" min="0" max="10" inputmode="numeric" /></label>
          <label>NoPMO<input name="score_nopmo" type="number" min="0" max="10" inputmode="numeric" /></label>
          <label>Focus<input name="score_focus" type="number" min="0" max="10" inputmode="numeric" /></label>
          <label>Sleep<input name="score_sleep" type="number" min="0" max="10" inputmode="numeric" /></label>
        </div>
        <div class="score-help">Self-rated 0 = didn't happen / total slip · 10 = all reps clean.</div>
      </div>

      <div class="review-section">
        <div class="review-section-header">Money</div>
        <div class="row">
          <label>Money in this week<input name="money_in" placeholder="£" inputmode="decimal" /></label>
          <label>Money out this week<input name="money_out" placeholder="£" inputmode="decimal" /></label>
        </div>
      </div>

      <div class="review-section">
        <div class="review-section-header">Forward</div>
        <label>Top 3 priorities next week<textarea name="priorities" rows="3" placeholder="If only 3 things happen, which 3?"></textarea></label>
        <label>Gratitudes (3 things)<textarea name="gratitudes" rows="2" placeholder="Health, family, dua answered, anything"></textarea></label>
        <label>Dua / intention<textarea name="dua" rows="2" placeholder="What am I asking Allah for this week?"></textarea></label>
        <label>Other notes<textarea name="notes" rows="2"></textarea></label>
      </div>

      <div class="actions">
        <button type="button" id="review-delete-btn" class="danger">Delete</button>
        <button type="button" id="review-cancel-btn">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Monthly Invoice editor -->
  <dialog id="invoice-editor">
    <form id="invoice-form">
      <h2 id="invoice-title">Monthly Invoice</h2>

      <div class="row">
        <label>Month<input name="month" type="month" required /></label>
        <label>Title<input name="title" placeholder="April Invoice Clean" autocomplete="off" /></label>
      </div>

      <div id="invoice-sections"></div>

      <button type="button" id="add-section-btn" class="ghost">+ Add section</button>

      <div class="invoice-grand-total">
        <label>Grand Total</label>
        <span id="invoice-grand-total-value">£0</span>
      </div>

      <label>Final message<textarea name="final_message" rows="2" placeholder="Can I pay 820 towards my bill please?"></textarea></label>
      <label>Private notes (not copied)<textarea name="notes" rows="2"></textarea></label>

      <div class="actions">
        <button type="button" id="invoice-delete-btn" class="danger">Delete</button>
        <button type="button" id="invoice-copy-btn" class="secondary">Copy for WhatsApp</button>
        <button type="button" id="invoice-cancel-btn">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/supabase.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
