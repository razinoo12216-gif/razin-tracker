<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="globe" cx="34%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="32%" stop-color="#2563eb"/>
      <stop offset="68%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <clipPath id="gc"><circle cx="256" cy="256" r="152"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="38"  cy="62"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="470" cy="55"  r="1.8" fill="white" opacity="0.65"/>
  <circle cx="480" cy="390" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="30"  cy="420" r="1.2" fill="white" opacity="0.55"/>
  <circle cx="108" cy="20"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="395" cy="490" r="1.2" fill="white" opacity="0.5"/>

  <!-- CASH BILLS (drawn before globe so globe sits on top) -->

  <!-- Bill TL -->
  <g transform="rotate(-32,115,125)" opacity="0.88">
    <rect x="52"  y="94"  width="126" height="62" rx="5" fill="#166534"/>
    <rect x="57"  y="99"  width="116" height="52" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1.2"/>
    <rect x="63"  y="106" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <rect x="165" y="106" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <text x="130" y="131" font-size="22" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
    <line x1="60" y1="113" x2="178" y2="113" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
    <line x1="60" y1="143" x2="178" y2="143" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bill TR -->
  <g transform="rotate(28,393,118)" opacity="0.85">
    <rect x="330" y="87"  width="126" height="62" rx="5" fill="#166534"/>
    <rect x="335" y="92"  width="116" height="52" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1.2"/>
    <rect x="341" y="99"  width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <rect x="443" y="99"  width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <text x="408" y="124" font-size="22" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
    <line x1="338" y1="106" x2="456" y2="106" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
    <line x1="338" y1="136" x2="456" y2="136" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bill BL -->
  <g transform="rotate(18,118,396)" opacity="0.83">
    <rect x="55"  y="365" width="126" height="62" rx="5" fill="#166534"/>
    <rect x="60"  y="370" width="116" height="52" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1.2"/>
    <rect x="66"  y="377" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <rect x="168" y="377" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <text x="133" y="402" font-size="22" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
    <line x1="63" y1="384" x2="181" y2="384" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
    <line x1="63" y1="414" x2="181" y2="414" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bill BR -->
  <g transform="rotate(-24,398,400)" opacity="0.85">
    <rect x="335" y="369" width="126" height="62" rx="5" fill="#166534"/>
    <rect x="340" y="374" width="116" height="52" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1.2"/>
    <rect x="346" y="381" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <rect x="448" y="381" width="30"  height="38" rx="3" fill="#14532d" opacity="0.55"/>
    <text x="413" y="406" font-size="22" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
    <line x1="343" y1="388" x2="461" y2="388" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
    <line x1="343" y1="418" x2="461" y2="418" stroke="#14532d" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bill L side -->
  <g transform="rotate(-12,62,258)" opacity="0.75">
    <rect x="2"   y="228" width="120" height="60" rx="5" fill="#166534"/>
    <rect x="7"   y="233" width="110" height="50" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1"/>
    <text x="62"  y="264" font-size="20" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
  </g>

  <!-- Bill R side -->
  <g transform="rotate(10,448,255)" opacity="0.75">
    <rect x="388" y="225" width="120" height="60" rx="5" fill="#166534"/>
    <rect x="393" y="230" width="110" height="50" rx="3" fill="#15803d" stroke="#14532d" stroke-width="1"/>
    <text x="448" y="261" font-size="20" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-weight="bold">$100</text>
  </g>

  <!-- GLOBE (covers inner parts of bills) -->
  <circle cx="256" cy="256" r="152" fill="url(#globe)"/>

  <!-- Grid lines clipped to globe -->
  <ellipse cx="256" cy="256" rx="152" ry="48"  fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.3" clip-path="url(#gc)"/>
  <ellipse cx="256" cy="208" rx="152" ry="48"  fill="none" stroke="#93c5fd" stroke-width="1"   opacity="0.25" clip-path="url(#gc)"/>
  <ellipse cx="256" cy="304" rx="152" ry="48"  fill="none" stroke="#93c5fd" stroke-width="1"   opacity="0.25" clip-path="url(#gc)"/>
  <ellipse cx="256" cy="256" rx="48"  ry="152" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.3" clip-path="url(#gc)"/>
  <ellipse cx="256" cy="256" rx="115" ry="152" fill="none" stroke="#93c5fd" stroke-width="1"   opacity="0.25" clip-path="url(#gc)"/>

  <!-- Continent blobs -->
  <path d="M208,188 Q232,178 257,188 Q272,200 260,220 Q244,228 222,218 Q204,208 208,188Z" fill="#16a34a" opacity="0.6" clip-path="url(#gc)"/>
  <path d="M270,222 Q295,216 312,232 Q317,250 300,257 Q278,260 267,246 Q260,234 270,222Z" fill="#16a34a" opacity="0.55" clip-path="url(#gc)"/>
  <path d="M178,252 Q200,242 216,258 Q220,275 205,281 Q186,284 176,270 Q170,260 178,252Z" fill="#16a34a" opacity="0.5" clip-path="url(#gc)"/>
  <path d="M233,282 Q260,274 278,288 Q283,306 265,313 Q244,317 231,304 Q225,294 233,282Z" fill="#16a34a" opacity="0.5" clip-path="url(#gc)"/>

  <!-- Globe shine -->
  <ellipse cx="212" cy="205" rx="38" ry="26" fill="white" opacity="0.09"/>

  <!-- "12" shadow (depth) -->
  <text x="259" y="298" font-family="'Arial Black',Impact,Arial,sans-serif" font-weight="900" font-size="110" text-anchor="middle" fill="#1e3a8a" opacity="0.45">12</text>

  <!-- "12" main text -->
  <text x="256" y="295" font-family="'Arial Black',Impact,Arial,sans-serif" font-weight="900" font-size="110" text-anchor="middle" fill="white" opacity="0.97">12</text>
</svg>
