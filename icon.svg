<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#150d3a"/>
      <stop offset="100%" stop-color="#05020f"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="65%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0052"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e879f9" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#e879f9" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#fae8ff" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#e879f9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#d8b4fe" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="top"><rect x="0" y="0"   width="512" height="256"/></clipPath>
    <clipPath id="bot"><rect x="0" y="256" width="512" height="256"/></clipPath>
    <clipPath id="pc"><circle cx="256" cy="256" r="155"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="40"  cy="65"  r="1.8" fill="white" opacity="0.8"/>
  <circle cx="105" cy="28"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="435" cy="50"  r="2.2" fill="white" opacity="0.7"/>
  <circle cx="475" cy="145" r="1"   fill="white" opacity="0.55"/>
  <circle cx="68"  cy="420" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="428" cy="450" r="1.2" fill="white" opacity="0.75"/>
  <circle cx="358" cy="68"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="490" cy="375" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="18"  cy="318" r="1.2" fill="white" opacity="0.55"/>
  <circle cx="160" cy="480" r="1"   fill="white" opacity="0.6"/>
  <circle cx="342" cy="492" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="178" cy="15"  r="1.2" fill="white" opacity="0.5"/>
  <circle cx="500" cy="215" r="1"   fill="white" opacity="0.45"/>

  <!-- Back rings (behind planet) -->
  <ellipse cx="256" cy="258" rx="238" ry="44" fill="none" stroke="url(#ring)"  stroke-width="22" clip-path="url(#top)" opacity="0.9"/>
  <ellipse cx="256" cy="258" rx="208" ry="35" fill="none" stroke="url(#ring2)" stroke-width="13" clip-path="url(#top)" opacity="0.7"/>

  <!-- Planet -->
  <circle cx="256" cy="256" r="155" fill="url(#planet)"/>

  <!-- Surface shimmer bands -->
  <ellipse cx="245" cy="218" rx="125" ry="22" fill="#a855f7" opacity="0.22" clip-path="url(#pc)"/>
  <ellipse cx="265" cy="295" rx="100" ry="16" fill="#1e0052" opacity="0.3"  clip-path="url(#pc)"/>

  <!-- "12" — font-size 110, baseline y=300, fits well within planet -->
  <text
    x="256" y="300"
    font-family="'Arial Black', Impact, Arial, sans-serif"
    font-weight="900"
    font-size="110"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="white"
    opacity="0.96">12</text>

  <!-- Front rings (over planet) -->
  <ellipse cx="256" cy="258" rx="238" ry="44" fill="none" stroke="url(#ring)"  stroke-width="22" clip-path="url(#bot)" opacity="0.9"/>
  <ellipse cx="256" cy="258" rx="208" ry="35" fill="none" stroke="url(#ring2)" stroke-width="13" clip-path="url(#bot)" opacity="0.7"/>
</svg>
