<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <radialGradient id="pl" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#0f0030"/>
    </radialGradient>
    <linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0"/>
      <stop offset="18%" stop-color="#f0abfc" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#fae8ff" stop-opacity="1"/>
      <stop offset="82%" stop-color="#f0abfc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="r2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d8b4fe" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ede9fe" stop-opacity="0.75"/>
      <stop offset="80%" stop-color="#d8b4fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bh"><rect x="0" y="0" width="512" height="258"/></clipPath>
    <clipPath id="fh"><rect x="0" y="258" width="512" height="254"/></clipPath>
    <clipPath id="pc"><circle cx="256" cy="256" r="162"/></clipPath>
  </defs>

  <!-- Space background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="42"  cy="68"  r="1.5" fill="white" opacity="0.75"/>
  <circle cx="108" cy="32"  r="1.2" fill="white" opacity="0.55"/>
  <circle cx="432" cy="52"  r="2"   fill="white" opacity="0.65"/>
  <circle cx="472" cy="138" r="1"   fill="white" opacity="0.5"/>
  <circle cx="72"  cy="415" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="425" cy="445" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="362" cy="72"  r="1"   fill="white" opacity="0.45"/>
  <circle cx="488" cy="368" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="20"  cy="315" r="1"   fill="white" opacity="0.5"/>
  <circle cx="158" cy="478" r="1.2" fill="white" opacity="0.55"/>
  <circle cx="340" cy="488" r="1"   fill="white" opacity="0.5"/>
  <circle cx="500" cy="210" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="178" cy="18"  r="1"   fill="white" opacity="0.45"/>
  <circle cx="295" cy="488" r="1.5" fill="white" opacity="0.35"/>

  <!-- Planet ambient glow -->
  <circle cx="256" cy="256" r="200" fill="#7c3aed" opacity="0.13" filter="url(#pglow)"/>

  <!-- Back rings -->
  <ellipse cx="256" cy="262" rx="242" ry="47" fill="none" stroke="url(#r1)" stroke-width="26" clip-path="url(#bh)" opacity="0.88"/>
  <ellipse cx="256" cy="262" rx="214" ry="39" fill="none" stroke="url(#r2)" stroke-width="15" clip-path="url(#bh)" opacity="0.72"/>

  <!-- Planet body -->
  <circle cx="256" cy="256" r="162" fill="url(#pl)"/>

  <!-- Surface atmosphere bands -->
  <ellipse cx="242" cy="215" rx="135" ry="24" fill="#a855f7" opacity="0.2"  clip-path="url(#pc)"/>
  <ellipse cx="268" cy="300" rx="108" ry="18" fill="#1e1b4b" opacity="0.28" clip-path="url(#pc)"/>
  <ellipse cx="256" cy="256" rx="155" ry="12" fill="#6d28d9" opacity="0.15" clip-path="url(#pc)"/>

  <!-- "12" -->
  <text x="256" y="308"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-weight="900"
    font-size="162"
    text-anchor="middle"
    fill="white"
    opacity="0.97"
    filter="url(#glow)">12</text>

  <!-- Front rings (over planet) -->
  <ellipse cx="256" cy="262" rx="242" ry="47" fill="none" stroke="url(#r1)" stroke-width="26" clip-path="url(#fh)" opacity="0.88"/>
  <ellipse cx="256" cy="262" rx="214" ry="39" fill="none" stroke="url(#r2)" stroke-width="15" clip-path="url(#fh)" opacity="0.72"/>
</svg>
